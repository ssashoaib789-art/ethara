<!DOCTYPE html>
<html>
<head>
  <title>TaskFlow</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0b0f1a, #1a1f35);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 420px;
      background: #141a2a;
      padding: 25px;
      border-radius: 12px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 6px;
      border: none;
      background: linear-gradient(90deg, #7b2ff7, #f107a3);
      color: white;
      cursor: pointer;
    }

    .card {
      background:#1f253d;
      padding:12px;
      margin-top:10px;
      border-radius:8px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .delete-btn {
      background:red;
      padding:5px 10px;
      border-radius:5px;
      cursor:pointer;
    }

    .status {
      padding:4px 10px;
      border-radius:5px;
      font-size:12px;
      cursor:pointer;
    }

    .pending { background:#ffab00; }
    .completed { background:#00c853; }

    #dashboard { display:none; }

    .welcome {
      text-align:center;
      margin-bottom:10px;
      color:#00ffcc;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- AUTH -->
  <div id="auth">

    <h2>TaskFlow</h2>

    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">
    <button onclick="login()">Login</button>

    <hr>

    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <select id="role">
      <option value="Admin">Admin</option>
      <option value="Member">Member</option>
    </select>

    <button onclick="signup()">Signup</button>

    <div id="authMsg"></div>

  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">

    <h3 class="welcome" id="welcome"></h3>

    <input id="projectName" placeholder="Project name">
    <button onclick="createProject()">Create Project</button>

    <select id="projectSelect"></select>

    <input id="taskTitle" placeholder="Task title">
    <button onclick="createTask()">Create Task</button>

    <button onclick="loadProjects()">View Projects</button>
    <button onclick="loadTasks()">View Tasks</button>

    <div id="output"></div>

  </div>

</div>

<script>

const BASE_URL = "https://web-production-4c997.up.railway.app";

// LOGIN
async function login() {
  const res = await fetch(BASE_URL+"/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: loginEmail.value,
      password: loginPassword.value
    })
  });

  const data = await res.json();

  if(data.message === "Login successful"){
    localStorage.setItem("userId", data.user.id);

    auth.style.display="none";
    dashboard.style.display="block";

    welcome.innerText="Welcome " + data.user.name;

    loadProjectOptions();
  } else {
    authMsg.innerText = data.message;
  }
}

// SIGNUP
async function signup() {
  const res = await fetch(BASE_URL+"/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      name: name.value,
      email: email.value,
      password: password.value,
      role: role.value
    })
  });

  const data = await res.json();
  authMsg.innerText=data.message;
}

// LOAD PROJECT OPTIONS
async function loadProjectOptions(){
  const res = await fetch(BASE_URL+"/projects/"+localStorage.getItem("userId"));
  const data = await res.json();

  let options="";
  data.forEach(p=>{
    options+=`<option value="${p.id}">${p.name}</option>`;
  });

  projectSelect.innerHTML=options;
}

// CREATE PROJECT
async function createProject(){
  const res = await fetch(BASE_URL+"/projects", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      name: projectName.value,
      owner_id: localStorage.getItem("userId")
    })
  });

  if(res.ok){
    output.innerHTML = "<div class='card'>✅ Project created</div>";
    loadProjectOptions();
  } else {
    output.innerHTML = "<div class='card'>❌ Failed</div>";
  }
}

// DELETE PROJECT
async function deleteProject(id){
  if(!confirm("Delete this project?")) return;

  const res = await fetch(BASE_URL+"/projects/"+id, {
    method:"DELETE"
  });

  if(res.ok){
    loadProjects();
    loadProjectOptions();
  }
}

// LOAD PROJECTS
async function loadProjects(){
  const res = await fetch(BASE_URL+"/projects/"+localStorage.getItem("userId"));
  const data = await res.json();

  let html="";
  data.forEach(p=>{
    html+=`
      <div class="card">
        ${p.name}
        <span class="delete-btn" onclick="deleteProject(${p.id})">Delete</span>
      </div>
    `;
  });

  output.innerHTML=html;
}

// CREATE TASK
async function createTask(){
  await fetch(BASE_URL+"/tasks", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      title: taskTitle.value,
      project_id: projectSelect.value,
      assigned_to: localStorage.getItem("userId")
    })
  });

  loadTasks();
}

// DELETE TASK
async function deleteTask(id){
  if(!confirm("Delete this task?")) return;

  await fetch(BASE_URL+"/tasks/"+id, {
    method:"DELETE"
  });

  loadTasks();
}

// TOGGLE STATUS
async function toggleStatus(id){
  await fetch(BASE_URL+"/tasks/"+id+"/status", {
    method:"PUT"
  });

  loadTasks();
}

// LOAD TASKS
async function loadTasks(){
  const projectId = projectSelect.value;

  const res = await fetch(BASE_URL+"/tasks/"+localStorage.getItem("userId"));
  const data = await res.json();

  const filtered = data.filter(t => t.project_id == projectId);

  let html="";

  filtered.forEach(t=>{
    html+=`
      <div class="card">
        ${t.title}
        <span>
          <span onclick="toggleStatus(${t.id})" class="status ${t.status}">
            ${t.status}
          </span>
          <span class="delete-btn" onclick="deleteTask(${t.id})">Delete</span>
        </span>
      </div>
    `;
  });

  output.innerHTML=html;
}

</script>

</body>
</html>
