<!DOCTYPE html>
<html>
<head>
  <title>TaskFlow</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0b0f1a, #1a1f35);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 380px;
      background: #141a2a;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(90deg, #7b2ff7, #f107a3);
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      opacity: 0.9;
    }

    .tabs {
      display: flex;
      margin-bottom: 10px;
    }

    .tabs button {
      flex: 1;
      background: #222;
    }

    .active {
      background: linear-gradient(90deg, #7b2ff7, #f107a3);
    }

    #dashboard {
      display: none;
    }

    .task-card {
      background: #1f253d;
      padding: 10px;
      margin-top: 8px;
      border-radius: 6px;
    }

    #message {
      margin-top: 10px;
    }

    .welcome {
      text-align: center;
      color: #00ffcc;
      font-weight: 600;
      margin-top: 10px;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- AUTH -->
  <div id="auth">

    <h2>TaskFlow</h2>

    <div class="tabs">
      <button id="loginTab" class="active" onclick="showLogin()">Login</button>
      <button id="signupTab" onclick="showSignup()">Sign Up</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Password">
      <button onclick="login()">Login</button>
    </div>

    <!-- SIGNUP -->
    <div id="signupForm" style="display:none;">
      <input type="text" id="name" placeholder="Full Name">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">

      <select id="role">
        <option value="Admin">Admin</option>
        <option value="Member">Member</option>
      </select>

      <button onclick="signup()">Create Account</button>
    </div>

  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">

    <h2>Dashboard</h2>

    <input id="projectName" placeholder="Project name">
    <button onclick="createProject()">Create Project</button>

    <input id="taskTitle" placeholder="Task title">
    <button onclick="createTask()">Create Task</button>

    <button onclick="loadTasks()">View Tasks</button>

    <div class="welcome" id="welcome"></div>

    <div id="message"></div>

  </div>

</div>

<script>

const BASE_URL = "https://web-production-4c997.up.railway.app";

// SWITCH
function showLogin() {
  loginForm.style.display = "block";
  signupForm.style.display = "none";
}

function showSignup() {
  loginForm.style.display = "none";
  signupForm.style.display = "block";
}

// SIGNUP
async function signup() {
  const res = await fetch(BASE_URL + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name: name.value,
      email: email.value,
      password: password.value,
      role: role.value
    })
  });

  const data = await res.json();
  alert(data.message);
}

// LOGIN
async function login() {
  const res = await fetch(BASE_URL + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: loginEmail.value,
      password: loginPassword.value
    })
  });

  const data = await res.json();

  if (data.message === "Login successful") {

    localStorage.setItem("userId", data.user.id);

    auth.style.display = "none";
    dashboard.style.display = "block";

    welcome.innerText = "Welcome " + data.user.name;

  } else {
    alert(data.message);
  }
}

// CREATE PROJECT
async function createProject() {
  await fetch(BASE_URL + "/projects", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name: projectName.value,
      owner_id: localStorage.getItem("userId")
    })
  });

  alert("Project created");
}

// CREATE TASK
async function createTask() {
  await fetch(BASE_URL + "/tasks", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      title: taskTitle.value,
      project_id: 1,
      assigned_to: localStorage.getItem("userId")
    })
  });

  alert("Task created");
}

// LOAD TASKS (CARD UI)
async function loadTasks() {
  const res = await fetch(BASE_URL + "/tasks/" + localStorage.getItem("userId"));
  const data = await res.json();

  let output = "";

  data.forEach(task => {
    output += `
      <div class="task-card">
        <b>${task.title}</b><br>
        Status: ${task.status}
      </div>
    `;
  });

  message.innerHTML = output;
}

</script>

</body>
</html>
