<!DOCTYPE html>
<html>
<head>
  <title>TaskFlow - Team Task Manager</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0b0f1a, #1a1f35);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 400px;
      background: #141a2a;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(90deg, #7b2ff7, #f107a3);
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      opacity: 0.9;
    }

    #dashboard {
      display: none;
    }

    .card {
      background:#1f253d;
      padding:12px;
      margin-top:10px;
      border-radius:8px;
    }

    .task-card {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .status {
      padding:4px 10px;
      border-radius:5px;
      font-size:12px;
    }

    .pending { background:#ffab00; }
    .completed { background:#00c853; }

    .welcome {
      text-align:center;
      color:#00ffcc;
      margin-top:10px;
      font-weight:600;
    }

    .section-title {
      margin-top: 15px;
      font-weight: 600;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- AUTH -->
  <div id="auth">

    <h2>TaskFlow</h2>

    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button onclick="login()">Login</button>

    <div class="section-title">Create Account</div>

    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <select id="role">
      <option value="Admin">Admin</option>
      <option value="Member">Member</option>
    </select>

    <button onclick="signup()">Sign Up</button>

    <div id="authMessage"></div>

  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">

    <h2>Dashboard</h2>

    <div class="welcome" id="welcome"></div>

    <input id="projectName" placeholder="Project name">
    <button onclick="createProject()">Create Project</button>

    <input id="taskTitle" placeholder="Task title">
    <button onclick="createTask()">Create Task</button>

    <button onclick="loadProjects()">View Projects</button>
    <button onclick="loadTasks()">View Tasks</button>

    <div id="output"></div>

  </div>

</div>

<script>

const BASE_URL = "https://web-production-4c997.up.railway.app";

// ---------- SIGNUP ----------
async function signup() {
  const res = await fetch(BASE_URL + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name: name.value,
      email: email.value,
      password: password.value,
      role: role.value
    })
  });

  const data = await res.json();

  authMessage.innerHTML = `<div class="card">✅ ${data.message}</div>`;
}

// ---------- LOGIN ----------
async function login() {
  const res = await fetch(BASE_URL + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: loginEmail.value,
      password: loginPassword.value
    })
  });

  const data = await res.json();

  if (data.message === "Login successful") {

    localStorage.setItem("userId", data.user.id);
    localStorage.setItem("role", data.user.role);

    auth.style.display = "none";
    dashboard.style.display = "block";

    welcome.innerText = "Welcome " + data.user.name + " (" + data.user.role + ")";

  } else {
    authMessage.innerHTML = `<div class="card">${data.message}</div>`;
  }
}

// ---------- CREATE PROJECT ----------
async function createProject() {

  if(localStorage.getItem("role") !== "Admin"){
    output.innerHTML = `<div class="card">❌ Only Admin can create projects</div>`;
    return;
  }

  await fetch(BASE_URL + "/projects", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name: projectName.value,
      owner_id: localStorage.getItem("userId")
    })
  });

  output.innerHTML = `<div class="card">✅ Project created</div>`;
}

// ---------- CREATE TASK ----------
async function createTask() {

  await fetch(BASE_URL + "/tasks", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      title: taskTitle.value,
      project_id: 1,
      assigned_to: localStorage.getItem("userId")
    })
  });

  output.innerHTML = `<div class="card">✅ Task created</div>`;
}

// ---------- LOAD PROJECTS ----------
async function loadProjects() {
  const res = await fetch(BASE_URL + "/projects/" + localStorage.getItem("userId"));
  const data = await res.json();

  let html = "<div class='section-title'>Projects</div>";

  data.forEach(p => {
    html += `<div class="card">${p.name}</div>`;
  });

  output.innerHTML = html;
}

// ---------- LOAD TASKS ----------
async function loadTasks() {
  const res = await fetch(BASE_URL + "/tasks/" + localStorage.getItem("userId"));
  const data = await res.json();

  let html = "<div class='section-title'>Tasks</div>";

  data.forEach(task => {
    html += `
      <div class="card task-card">
        <span>${task.title}</span>
        <span class="status ${task.status === 'completed' ? 'completed' : 'pending'}">
          ${task.status}
        </span>
      </div>
    `;
  });

  output.innerHTML = html;
}

</script>

</body>
</html>
