<!DOCTYPE html>
<html>
<head>
  <title>Team Task Manager</title>
  <style>
    body {
      font-family: Arial;
      background: #0b0f1a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #141a2a;
      padding: 25px;
      border-radius: 10px;
      width: 350px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      background: purple;
      color: white;
      cursor: pointer;
    }

    .tabs {
      display: flex;
    }

    .tabs button {
      flex: 1;
      background: #222;
    }

    .active {
      background: purple;
    }

    #dashboard {
      display: none;
    }

    #message {
      margin-top: 10px;
      color: yellow;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<div class="box">

  <!-- LOGIN / SIGNUP -->
  <div id="auth">

    <div class="tabs">
      <button id="loginTab" class="active" onclick="showLogin()">Login</button>
      <button id="signupTab" onclick="showSignup()">Sign Up</button>
    </div>

    <div id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Password">
      <button onclick="login()">Login</button>
    </div>

    <div id="signupForm" style="display:none;">
      <input type="text" id="name" placeholder="Full Name">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">

      <select id="role">
        <option value="Admin">Admin</option>
        <option value="Member">Member</option>
      </select>

      <button onclick="signup()">Create Account</button>
    </div>

  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <h3>Dashboard</h3>

    <button onclick="createProject()">Create Project</button>
    <button onclick="createTask()">Create Task</button>
    <button onclick="loadTasks()">View Tasks</button>

    <div id="message"></div>
  </div>

</div>

<script>

const BASE_URL = "https://web-production-4c997.up.railway.app";

// ---------- UI SWITCH ----------
function showLogin() {
  document.getElementById("loginForm").style.display = "block";
  document.getElementById("signupForm").style.display = "none";
}

function showSignup() {
  document.getElementById("loginForm").style.display = "none";
  document.getElementById("signupForm").style.display = "block";
}

// ---------- SIGNUP ----------
async function signup() {
  const res = await fetch(BASE_URL + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      password: document.getElementById("password").value,
      role: document.getElementById("role").value
    })
  });

  const data = await res.json();
  alert(data.message);
}

// ---------- LOGIN ----------
async function login() {
  const res = await fetch(BASE_URL + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: document.getElementById("loginEmail").value,
      password: document.getElementById("loginPassword").value
    })
  });

  const data = await res.json();

  if (data.message === "Login successful") {

    // STORE USER
    localStorage.setItem("userId", data.user.id);
    localStorage.setItem("role", data.user.role);

    // SWITCH UI
    document.getElementById("auth").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    document.getElementById("message").innerText =
      "Welcome " + data.user.name;

  } else {
    alert(data.message);
  }
}

// ---------- PROJECT ----------
async function createProject() {
  const name = prompt("Enter project name");

  await fetch(BASE_URL + "/projects", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name: name,
      owner_id: localStorage.getItem("userId")
    })
  });

  alert("Project created");
}

// ---------- TASK ----------
async function createTask() {
  const title = prompt("Enter task");

  await fetch(BASE_URL + "/tasks", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      title: title,
      project_id: 1,
      assigned_to: localStorage.getItem("userId")
    })
  });

  alert("Task created");
}

// ---------- LOAD TASKS ----------
async function loadTasks() {
  const res = await fetch(BASE_URL + "/tasks/" + localStorage.getItem("userId"));
  const data = await res.json();

  let output = "Your Tasks:\n\n";

  data.forEach(task => {
    output += task.title + " (" + task.status + ")\n";
  });

  document.getElementById("message").innerText = output;
}

</script>

</body>
</html>
