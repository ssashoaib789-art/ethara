<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TaskFlow</title>
<style>
body {
  background: #0f0f1a;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 350px;
  padding: 20px;
  background: #1a1a2e;
  border-radius: 10px;
}

input, select, button {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  border-radius: 5px;
  border: none;
}

button {
  background: #6c63ff;
  color: white;
  cursor: pointer;
}

.toggle {
  display: flex;
  justify-content: space-between;
}

.error {
  color: red;
}
</style>
</head>

<body>

<div class="container">

<div class="toggle">
  <button onclick="showLogin()">Login</button>
  <button onclick="showSignup()">Sign Up</button>
</div>

<div id="loginForm">
  <input type="email" id="loginEmail" placeholder="Email">
  <input type="password" id="loginPassword" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="signupForm" style="display:none;">
  <input type="text" id="name" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <select id="role">
    <option>Admin</option>
    <option>Member</option>
  </select>
  <button onclick="signup()">Create Account</button>
</div>

<p class="error" id="errorMsg"></p>

</div>

<script>

const BASE_URL = "https://web-production-4c997.up.railway.app"; // 🔥 YOUR URL

function showLogin() {
  document.getElementById("loginForm").style.display = "block";
  document.getElementById("signupForm").style.display = "none";
}

function showSignup() {
  document.getElementById("loginForm").style.display = "none";
  document.getElementById("signupForm").style.display = "block";
}

// ✅ SIGNUP
async function signup() {
  const data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value,
    role: document.getElementById("role").value
  };

  try {
    const res = await fetch(`${BASE_URL}/register`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();
    document.getElementById("errorMsg").innerText = result.message || "Success!";
  } catch (err) {
    document.getElementById("errorMsg").innerText = "Signup failed";
  }
}

// ✅ LOGIN
async function login() {
  const data = {
    email: document.getElementById("loginEmail").value,
    password: document.getElementById("loginPassword").value
  };

  try {
    const res = await fetch(`${BASE_URL}/login`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (result.token) {
      alert("Login successful!");
    } else {
      document.getElementById("errorMsg").innerText = result.message;
    }

  } catch (err) {
    document.getElementById("errorMsg").innerText = "Login failed";
  }
}

</script>

</body>
</html>
