<!DOCTYPE html>
<html>
<head>
  <title>TaskFlow</title>
  <style>
    body {font-family: Arial;background:#0b1220;color:white;display:flex;justify-content:center;}
    .box {width:420px;margin-top:30px;background:#1c2338;padding:20px;border-radius:10px;}
    input,select,button {width:100%;margin:6px 0;padding:10px;border-radius:5px;border:none;}
    button {background:linear-gradient(90deg,#7b2ff7,#f107a3);color:white;}
    .card {background:#2a3355;padding:10px;margin-top:10px;border-radius:5px;}
  </style>
</head>

<body>
<div class="box">

<div id="auth">
<h2>Login</h2>
<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<h3>Signup</h3>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<select id="role">
<option>Admin</option>
<option>Member</option>
</select>
<button onclick="signup()">Signup</button>
</div>

<div id="app" style="display:none">

<h3 id="welcome"></h3>

<input id="projectName" placeholder="Project name">
<button onclick="createProject()">Create Project</button>

<select id="projectSelect" onchange="loadMembers()"></select>

<select id="memberSelect"></select>
<button onclick="addMember()">Add Member</button>

<input id="taskTitle" placeholder="Task title">

<select id="assignUser"></select>

<button onclick="createTask()">Create Task</button>

<button onclick="loadProjects()">View Projects</button>
<button onclick="loadTasks()">View Tasks</button>

<div id="output"></div>

</div>

</div>

<script>

const BASE="https://web-production-4c997.up.railway.app";

// LOGIN
async function login(){
 let res=await fetch(BASE+"/login",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({email:loginEmail.value,password:loginPassword.value})});
 let d=await res.json();

 if(d.message==="Login successful"){
   localStorage.setItem("uid",d.user.id);
   localStorage.setItem("role",d.user.role);

   auth.style.display="none";
   app.style.display="block";

   welcome.innerText="Welcome "+d.user.name+" ("+d.user.role+")";

   loadProjects();
   loadUsers();
 }
}

// SIGNUP
async function signup(){
 await fetch(BASE+"/register",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({name:name.value,email:email.value,password:password.value,role:role.value})});
 alert("Registered");
}

// LOAD ALL USERS
async function loadUsers(){
 let res=await fetch(BASE+"/users");
 let data=await res.json();

 memberSelect.innerHTML=data.map(u=>`<option value=${u.id}>${u.name||("User-"+u.id)}</option>`);
}

// CREATE PROJECT
async function createProject(){
 let res=await fetch(BASE+"/projects",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({name:projectName.value,owner_id:localStorage.getItem("uid")})});

 let d=await res.json();
 alert(d.message);
 loadProjects();
}

// LOAD PROJECTS
async function loadProjects(){
 let res=await fetch(BASE+"/projects/"+localStorage.getItem("uid"));
 let data=await res.json();

 projectSelect.innerHTML=data.map(p=>`<option value=${p.id}>${p.name}</option>`);

 output.innerHTML=data.map(p=>`<div class="card">${p.name}</div>`).join("");

 loadMembers();
}

// ADD MEMBER
async function addMember(){
 let pid=projectSelect.value;

 let res=await fetch(BASE+"/projects/"+pid+"/members",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({admin_id:localStorage.getItem("uid"),user_id:memberSelect.value})});

 let d=await res.json();
 alert(d.message);

 loadMembers();
}

// LOAD MEMBERS
async function loadMembers(){
 let pid=projectSelect.value;
 if(!pid) return;

 let res=await fetch(BASE+"/projects/"+pid+"/members");
 let data=await res.json();

 assignUser.innerHTML=data.map(u=>`<option value=${u.id}>${u.name||("User-"+u.id)}</option>`);
}

// CREATE TASK
async function createTask(){
 let res=await fetch(BASE+"/tasks",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({
   title:taskTitle.value,
   project_id:projectSelect.value,
   assigned_to:assignUser.value
 })});

 let d=await res.json();
 alert(d.message);

 loadTasks();
}

// LOAD TASKS
async function loadTasks(){
 let res=await fetch(BASE+"/tasks/"+localStorage.getItem("uid"));
 let data=await res.json();

 output.innerHTML=data.map(t=>`
 <div class="card">
 ${t.title} - ${t.status}
 </div>`).join("");
}

</script>

</body>
</html>
