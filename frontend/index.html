<!DOCTYPE html>
<html>
<head>
<title>TaskFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: white;
  margin: 0;
  display: flex;
  justify-content: center;
}

.container {
  width: 480px;
  margin-top: 30px;
  background: #111827;
  padding: 20px;
  border-radius: 12px;
}

h2, h3 {
  margin: 10px 0;
}

.section {
  margin-top: 20px;
  padding: 15px;
  background: #1f2937;
  border-radius: 10px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 6px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
  background: linear-gradient(90deg,#7b2ff7,#f107a3);
  color: white;
  cursor: pointer;
}

.card {
  background: #374151;
  padding: 10px;
  margin-top: 8px;
  border-radius: 6px;
}

.stats {
  display: flex;
  justify-content: space-between;
}

.stat {
  background: #374151;
  padding: 10px;
  border-radius: 6px;
  width: 30%;
  text-align: center;
}

.pending { background:#f59e0b; }
.completed { background:#10b981; }

.hidden { display:none; }

</style>
</head>

<body>

<div class="container">

<!-- AUTH -->
<div id="auth">
<h2>TaskFlow</h2>

<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<hr>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<select id="role">
<option>Admin</option>
<option>Member</option>
</select>

<button onclick="signup()">Signup</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<h3 id="welcome"></h3>

<div class="section stats" id="stats"></div>

<!-- PROJECT -->
<div class="section">
<h3>Projects</h3>

<input id="projectName" placeholder="New Project">
<button onclick="createProject()">Create Project</button>

<select id="projectSelect" onchange="loadMembers()"></select>

<button onclick="loadProjects()">Refresh Projects</button>

<div id="projectList"></div>
</div>

<!-- MEMBERS -->
<div class="section" id="memberSection">
<h3>Team Members</h3>

<select id="memberSelect"></select>
<button onclick="addMember()">Add Member</button>
</div>

<!-- TASKS -->
<div class="section">
<h3>Tasks</h3>

<input id="taskTitle" placeholder="Task Title">

<select id="assignUser"></select>

<button onclick="createTask()">Create Task</button>

<button onclick="loadTasks()">Refresh Tasks</button>

<div id="taskList"></div>
</div>

</div>

</div>

<script>

const BASE="https://web-production-4c997.up.railway.app";

// LOGIN
async function login(){
 let res=await fetch(BASE+"/login",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({email:loginEmail.value,password:loginPassword.value})});

 let d=await res.json();

 if(d.message==="Login successful"){
   localStorage.setItem("uid",d.user.id);
   localStorage.setItem("role",d.user.role);

   auth.style.display="none";
   dashboard.classList.remove("hidden");

   welcome.innerText="Welcome "+d.user.name+" ("+d.user.role+")";

   if(d.user.role==="Member"){
     memberSection.style.display="none";
     projectName.style.display="none";
   }

   loadProjects();
   loadUsers();
   loadStats();
 }
}

// SIGNUP
async function signup(){
 await fetch(BASE+"/register",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({name:name.value,email:email.value,password:password.value,role:role.value})});
 alert("Registered");
}

// USERS
async function loadUsers(){
 let res=await fetch(BASE+"/users");
 let data=await res.json();

 memberSelect.innerHTML=data.map(u=>`<option value=${u.id}>${u.name||("User-"+u.id)}</option>`);
}

// PROJECTS
async function createProject(){
 await fetch(BASE+"/projects",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({name:projectName.value,owner_id:localStorage.getItem("uid")})});

 loadProjects();
}

async function loadProjects(){
 let res=await fetch(BASE+"/projects/"+localStorage.getItem("uid"));
 let data=await res.json();

 projectSelect.innerHTML=data.map(p=>`<option value=${p.id}>${p.name}</option>`);

 projectList.innerHTML=data.map(p=>`<div class="card">${p.name}</div>`).join("");

 loadMembers();
}

// MEMBERS
async function addMember(){
 let pid=projectSelect.value;

 await fetch(BASE+"/projects/"+pid+"/members",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({admin_id:localStorage.getItem("uid"),user_id:memberSelect.value})});

 loadMembers();
}

async function loadMembers(){
 let pid=projectSelect.value;

 let res=await fetch(BASE+"/projects/"+pid+"/members");
 let data=await res.json();

 assignUser.innerHTML=data.map(u=>`<option value=${u.id}>${u.name}</option>`);
}

// TASKS
async function createTask(){
 await fetch(BASE+"/tasks",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({
   title:taskTitle.value,
   project_id:projectSelect.value,
   assigned_to:assignUser.value
 })});

 loadTasks();
}

async function loadTasks(){
 let res=await fetch(BASE+"/tasks/"+localStorage.getItem("uid"));
 let data=await res.json();

 taskList.innerHTML=data.map(t=>`
 <div class="card ${t.status}">
 ${t.title} - ${t.status}
 </div>`).join("");
}

// STATS
async function loadStats(){
 let res=await fetch(BASE+"/tasks/"+localStorage.getItem("uid"));
 let data=await res.json();

 stats.innerHTML=`
 <div class="stat">Total ${data.length}</div>
 <div class="stat">Done ${data.filter(t=>t.status=="completed").length}</div>
 <div class="stat">Pending ${data.filter(t=>t.status=="pending").length}</div>
 `;
}

</script>

</body>
</html>
